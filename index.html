<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苏联方块：第一工程原型</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-shell">
        <div id="header-bar">
            <div>
                <p class="eyebrow">Red Directorate Simulation</p>
                <h1>苏联方块：第一工程原型</h1>
            </div>
            <p id="status-text">生产线运转中</p>
        </div>

        <div id="game-container">
            <div id="playfield-frame">
                <canvas id="tetris" width="240" height="400"></canvas>
                <div id="controls">
                    <p>移动: ← →</p>
                    <p>下落: ↓ / 空格</p>
                    <p>旋转: ↑ / Z / X</p>
                </div>
            </div>

            <div id="side-panel">
                <h2>指令中心</h2>
                <div class="stat-box">
                    <p>工业产值 (Score): <span id="score">0</span></p>
                    <p>产量倍率 (Mult): <span id="mult">1.0</span> x</p>
                </div>

                <div class="panel-box">
                    <h3>已获得的勋章 (Slots)</h3>
                    <div id="medal-slots">
                        <div class="empty-slot">等待指令...</div>
                        <div class="empty-slot">等待指令...</div>
                        <div class="empty-slot">等待指令...</div>
                        <div class="empty-slot">等待指令...</div>
                    </div>
                </div>

                <div class="panel-box">
                    <h3>运行规则</h3>
                    <p>消行会触发肉鸽钩子。</p>
                    <p>当前版本仅保留勋章插槽与倍率接口。</p>
                </div>
            </div>
        </div>
    </div>

    <script src="rogue.js"></script>
    <script src="core.js"></script>
</body>
</html>
